<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tagebuch</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <script src="scripts/script.js" defer></script>

    <!--Fonts die für die Webseite verwendet werden-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body onload="init()">
    <header>
      <h1>Gaming Tagebuch</h1>
    </header>

    <main>
      <!--Formular und restliche Webseite-->

      <!--Benutzereingabe-->
      <form>
        <!-- Titel; Bewertung (1-5 als Schulnote); kurzes Fazit -->
        <label for="titel">Titel des Spiels: </label>
        <input type="text" id="titel" />

        <label for="bewertung">Bewertung (1 - 5 => Schulnoten)</label>
        <input type="number" id="bewertung" min="1" max="5" />

        <label for="fazit">Kurzes Fazit: </label>
        <textarea id="fazit" maxlength="300"></textarea>

        <label for="datumanfang">Datum andem Spiel angefangen wurde: </label>
        <input type="date" id="datumanfang">
        
        <label for="datumende">Datum andem Spiel beendet wurde (Default: Heute): </label>
        <input type="date" id="datumende">

        <label for="plattform">Plattform: </label>
        <select name="plattform" id="plattform">
          <option value="">--Plattform auswählen--</option>
          <option value="PC">Pc (Steam,Epic Games,etc..)</option>
          <option value="Nintendo">Nintendo</option>
          <option value="PlayStation">PlayStation</option>
          <option value="XBox">XBox</option>
        </select>

        <button type="button" id="form-btn">Fertigstellen</button>
      </form>

      <!--Anzeige Feld -->
      <select name="sortieren" id="sortieren">
        <option value="standard">Keine Sortierung</option>
        <option value="aufsteigend">Bewertung aufsteigend</option>
        <option value="absteigend">Bewertung absteigend</option>
        <option value="az">Titel A-Z</option>
        <option value="za">Titel Z-A</option>
      </select>

      <div id="BoxSpiele"></div>
    </main>

    <footer>
      <!--Copyright oder sonstige unwichtige profissoniele Daten-->
    </footer>
  </body>
</html>
